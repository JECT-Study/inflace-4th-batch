spring:
  profiles:
    default: local
  application:
    name: inflace-batch
  batch:
    job:
      enabled: false
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
  task:
    scheduling:
      pool:
        size: 2
      thread-name-prefix: scheduler-
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GOOGLE_SMTP_USERNAME:}
    password: ${GOOGLE_SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    auth-code-expiration-millis: 1800000  # 30 * 60 * 1000 == 30분

email:
  outbox:
    relay:
      max-attempt-count: 3
      batch-size: 20
      concurrency: 10
      schedule:
        enabled: true
        fixed-delay-ms: 5000

youtube:
  batch:
    api-key: ${YT_API_KEY:}
    fallback-api-keys: ${YT_FALLBACK_API_KEYS:}
    base-url: https://www.googleapis.com/youtube/v3
    region-code: KR
    hl: ko_KR
    min-channel-count: 50
    recent-days: 30
    brand-ai:
      model: ${YOUTUBE_BRAND_AI_MODEL:GPT_4O_MINI}
      max-tokens: 100
      temperature: 0.1
      context-radius: 400
      max-answer-length: 50
    notification:
      discord:
        enabled: true
        webhook-url: ${YOUTUBE_BATCH_DISCORD_WEBHOOK_URL:}
        username: inflace-batch
    schedule:
      enabled: true
      cron: "0 0 3 * * *"
      zone: Asia/Seoul

resilience4j:
  bulkhead:
    instances:
      youtubeBrandAiExtractor:
        max-concurrent-calls: 4
        max-wait-duration: 2s
